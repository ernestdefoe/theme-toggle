name: Post release to Flarum support site

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      # Build a usable changelog. If the release body has real content,
      # use it as-is. If it's empty or one of the known release-drafter
      # placeholders ("No changes", "No changes made.", a lone
      # "Full Changelog" link, etc.), fall back to enumerating commits
      # between the previous tag and this one via the compare API.
      #
      # Without this fallback every forum post says "No changes" because
      # release-drafter only counts labeled PRs and commits straight to
      # main never get labeled.
      - name: Build changelog
        id: changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          set -euo pipefail

          # Strip whitespace + known placeholder lines to decide if the
          # body has anything meaningful in it.
          stripped=$(printf '%s\n' "${RELEASE_BODY:-}" \
            | sed -E '/^\s*$/d' \
            | sed -E '/^##[[:space:]]+What.s Changed[[:space:]]*$/Id' \
            | sed -E '/^\*[[:space:]]*No changes[[:space:]]*$/Id' \
            | sed -E '/^No changes( made)?\.?[[:space:]]*$/Id' \
            | sed -E '/^\*\*Full Changelog\*\*:.*/d' \
            | sed -E '/^Full Changelog:.*/d')

          if [ -n "$stripped" ]; then
            echo "Release body has content — using it as-is."
            body="$RELEASE_BODY"
          else
            echo "Release body is empty/placeholder — building from commits."

            # Find the previous tag: pick the most recent tag whose name
            # is not this release's tag. GitHub returns tags in
            # most-recent-first order.
            previous_tag=$(gh api "repos/${GH_REPO}/tags?per_page=100" \
              --jq '[.[] | select(.name != env.RELEASE_TAG) | .name][0] // empty')

            if [ -z "$previous_tag" ]; then
              echo "No previous tag — treating as initial release."
              body="_Initial release._"
            else
              echo "Comparing ${previous_tag}...${RELEASE_TAG}"
              # Cap at 60 commits to keep the forum post reasonable;
              # skip merge commits (they're noise on a squash-merge / direct-push repo).
              changelog=$(gh api --paginate \
                "repos/${GH_REPO}/compare/${previous_tag}...${RELEASE_TAG}" \
                --jq '[.commits[]
                       | select((.parents | length) < 2)
                       | "- " + (.commit.message | split("\n")[0])
                      ] | .[:60] | join("\n")')

              if [ -z "$changelog" ]; then
                body="_No commits between ${previous_tag} and ${RELEASE_TAG}._"
              else
                body=$(printf '## What'"'"'s Changed\n\n%s\n\n**Full Changelog**: https://github.com/%s/compare/%s...%s\n' \
                  "$changelog" "$GH_REPO" "$previous_tag" "$RELEASE_TAG")
              fi
            fi
          fi

          # Emit as a multi-line GHA output.
          delim="EOF_$(openssl rand -hex 8)"
          {
            printf 'body<<%s\n' "$delim"
            printf '%s\n' "$body"
            printf '%s\n' "$delim"
          } >> "$GITHUB_OUTPUT"

      - name: Post reply to support discussion
        env:
          FLARUM_FORUM_URL: ${{ vars.FLARUM_FORUM_URL }}
          FLARUM_DISCUSSION_ID: ${{ vars.FLARUM_DISCUSSION_ID }}
          FLARUM_API_KEY: ${{ secrets.FLARUM_API_KEY }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_BODY: ${{ steps.changelog.outputs.body }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail

          if [ -z "${FLARUM_FORUM_URL}" ] || [ -z "${FLARUM_DISCUSSION_ID}" ] || [ -z "${FLARUM_API_KEY}" ]; then
            echo "Missing FLARUM_FORUM_URL / FLARUM_DISCUSSION_ID / FLARUM_API_KEY — set repo variables and secret." >&2
            exit 1
          fi

          CONTENT=$(printf '## %s %s\n\n%s\n\n[View release on GitHub](%s)\n' \
            "$REPO_NAME" "$RELEASE_TAG" "${RELEASE_BODY:-_No release notes provided._}" "$RELEASE_URL")

          PAYLOAD=$(jq -n \
            --arg content "$CONTENT" \
            --arg did "$FLARUM_DISCUSSION_ID" \
            '{data:{type:"posts",attributes:{content:$content},relationships:{discussion:{data:{type:"discussions",id:$did}}}}}')

          HTTP_CODE=$(curl -sS -o /tmp/flarum-resp.json -w '%{http_code}' \
            -X POST "${FLARUM_FORUM_URL%/}/api/posts" \
            -H "Authorization: Token ${FLARUM_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          echo "Flarum responded with HTTP $HTTP_CODE"
          cat /tmp/flarum-resp.json
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            exit 1
          fi
